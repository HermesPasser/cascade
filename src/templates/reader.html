<!doctype html>
<html>
	<head>
		<title>Reader</title>
		<style>
			:root {
				--img-margin: auto;
				--direction: column; /* so i can change to columns if i ever implemnte double page*/
				--background: white;
			}

			body {
				display: flex;
				flex-direction: row;
				background-color: var(--background);
			}

			/* TODO: não consigo colocar o scroll nisso no lugar do body para o
			control não descer junto com o scroll gerado pelas imagens */
			.image-wrapper {
				display: flex;
				flex-direction: var(--direction);
				justify-content: space-around;
				width: 100%;

				img {
					width: 100%;
					/* auto or zero to no margin in longstrip */
					margin-bottom: var(--img-margin);

					/* width: fit-content;
                    height: fit-content;
                    inline-size: fit-content;
                    block-size: fit-content; */

					/* max-width: 100%;
					max-height: 100%;
					object-fit: contain;
					display: block; */
				}
			}

			.controls.closed {
				transform: translateX(260px);
			}

			.controls {
				display: flex;
				flex-direction: column;
				box-shadow: 20px 0 2px -20px gray inset;
				background: var(--background);
				max-height: calc(100vh - 32px);
				overflow: auto;
				transform: translateX(0px);
				transition: 0.5s;
				gap: 0.2rem;
				padding: 1rem 1rem;

				position: fixed;
				bottom: 0;
				right: 0;
				top: 0;

				.control-input {
					padding: 10px 8px;
					border-radius: 6px;
					box-shadow: none;

					&:not(:hover):not(:active):not(:focus) {
						border: 1px solid #e0e0e0;
					}
				}

				.controls-close-wrapper {
					display: flex;
					align-items: flex-start;
					flex-direction: column;
					margin-bottom: 1rem;

					button {
						border: none;
						border-radius: 50%;
						padding: 1rem 1rem;

						&:not(:hover):not(:active):not(:focus) {
							box-shadow: none;
							background: unset;
						}
					}
				}

				.bg-color-button {
					display: flex;
					align-items: center;
					justify-content: center;

					input {
						border: none;
						box-shadow: none;
						appearance: none;
						padding: 0;
					}
				}

				div {
					display: flex;
					justify-content: space-around;

					select {
						width: 40%;
					}
					button {
						width: auto;
					}
				}
			}

			@media only screen and (max-width: 1000px) {
				.controls {
					select,
					button {
						font-size: xx-large;
						height: 5rem;
					}
				}
			}
		</style>
	</head>

	<body>
		<div id="imageWrapper" class="image-wrapper" onclick="handleClick(event)"></div>

		<div id="controls" class="controls">
			<div class="controls-close-wrapper">
				<button onclick="controls.classList.toggle('closed')">X</button>
			</div>
			<div class="controls-inner">
				<button onclick="previousImage(event)" class="control-input">&lt;</button>
				<select id="pageSelector" onchange="changePageFromSelector()" class="control-input">
					{% for i in pages %}
					<option id="option-img-{{ loop.index }}">{{ loop.index }}</option>
					{% endfor %}
				</select>
				<button onclick="nextImage(event)" class="control-input">&gt;</button>
			</div>
			<!-- TODO: portugues por consistência -->
			<button onclick="padding()" class="control-input">add padding</button>
			<button id="modeButton" onclick="toogleMode()" class="control-input">Mode: Long Strip</button>

			<button onclick="colorInput.click()" class="bg-color-button control-input">
				background
				<input
					id="colorInput"
					class="sex"
					onchange="root.style.setProperty('--background', event.target.value)"
					type="color"
				/>
			</button>
		</div>

		<script id="imagesJson" type="application/json">
			{{ pages|tojson }}
		</script>
		<script>
			"use strict";

			// TODO: content fit options
			// TODO: dark mode

			const DISPLAY_MODE = Object.freeze({
				LONG_STRIP: "longstrip",
				SINGLE_PAGE: "singlepage"
			});

			let mode = DISPLAY_MODE.SINGLE_PAGE;
			const images = JSON.parse(imagesJson.textContent);
			let index = (Number.parseInt(new URLSearchParams(new URL(window.location).search).get("page")) || 1) - 1;

			window.onload = (_) => {
				updateSelector();
				display(mode);
			};

			function display(newMode) {
				// TODO: May we should not actually delete all the elements when its not need?
				mode = newMode;
				let maybeImgToScroolTo = null;
				imageWrapper.querySelectorAll("*").forEach((e) => e.remove());
				if (mode === DISPLAY_MODE.LONG_STRIP) {
					layoutLongstrip();
					images.forEach((image, i) => {
						const img = document.createElement("img");
						img.src = image;
						img.setAttribute("data-img-index", i.toString());
						// Maybe add the option for lerping to the next image instead of jumping
						imageWrapper.appendChild(img);

						if (i === index) {
							maybeImgToScroolTo = img;
						}

						if (i === images.length - 1) {
							// NOTE: if i pass the img dimensions, set the size beforehand then i would not have to wait
							//       for others images to load before scrolling into the right place.

							// Scroll to current image index after the last image (and the others, i hope) is loaded
							img.onload = () => {
								if (maybeImgToScroolTo) {
									maybeImgToScroolTo.scrollIntoView();
								}
							};
							img.onerror = img.onload;
						}
					});
				} else {
					layoutManga();
					const img = document.createElement("img");
					img.src = images[index] ?? images[0];
					img.setAttribute("data-img-index", "0");
					imageWrapper.appendChild(img);
				}
			}

			function toogleMode() {
				if (mode === DISPLAY_MODE.LONG_STRIP) {
					manga();
					modeButton.innerText = "Mode: Single page"
				} else {
					modeButton.innerText = "Mode: Long Strip"
					longstrip();
				}
			}

			function handleClick(event) {
				// Would be nice if this was changed to clicking top/bottom on longstrip mode
				// TODO: later configure if 'left' click should go back or if clicking should go always to the next
				const rect = event.target.getBoundingClientRect();
				const x = event.clientX - rect.left;
				const w = rect.width;
				if (x < w / 3) {
					previousImage();
				} else if (x < (2 * w) / 3) {
					controls.classList.toggle("closed");
				} else {
					nextImage();
				}
			}

			function updateSelector() {
				pageSelector.value = index + 1;
			}

			function previousImage() {
				changePage(index - 1);
			}

			function nextImage() {
				changePage(index + 1);
			}

			function changePageFromSelector() {
				changePage(pageSelector.value - 1);
			}

			function changePage(newIndex) {
				if (newIndex < 1 || newIndex >= images.length) {
					newIndex = 0;
				}

				index = newIndex;
				// TODO: make option scrolling into view be also "instant"

				if (mode === DISPLAY_MODE.SINGLE_PAGE) {
					const imgElement = imageWrapper.getElementsByTagName("img")[0];
					imgElement.src = images[index];

					// On single page mode we scroll back to the top when the image is replaced by the next
					// TODO: make configurable
					imageWrapper.scrollIntoView({ behavior: "smooth" });
				} else if (mode === DISPLAY_MODE.LONG_STRIP) {
					// TODO: this can make the scroll go backwards if the user is
					//       "between" two pages. To fix we need to get the index
					//       from the image that the user actually clicked
					const imgElement = imageWrapper.querySelector(`[data-img-index="${newIndex}"]`);
					imgElement.scrollIntoView({ behavior: "smooth" });
				}

				let url = new URL(window.location.href);
				url.searchParams.set("page", index + 1 + "");
				window.history.pushState({}, "", url);
				updateSelector();
			}

			const root = document.documentElement;
			function padding() {
				root.style.setProperty("--img-margin", "20px");
			}

			function layoutLongstrip() {
				root.style.setProperty("--img-margin", "auto");
				root.style.setProperty("--direction", "column");
			}

			function longstrip() {
				display(DISPLAY_MODE.LONG_STRIP);
			}

			function layoutManga() {
				root.style.setProperty("--img-margin", "auto");
				root.style.setProperty("--direction", "row");
			}

			function manga() {
				display(DISPLAY_MODE.SINGLE_PAGE);
				imageWrapper.scrollIntoView();
			}
		</script>
	</body>
</html>
